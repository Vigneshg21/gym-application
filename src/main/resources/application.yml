spring:
  application:
    name: gym-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gym}
    username: ${SPRING_DATASOURCE_USERNAME:Ajeesh}
    password: ${SPRING_DATASOURCE_PASSWORD:8072125716}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
        jdbc:
          time_zone: ${APP_TIME_ZONE:Asia/Kolkata}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
        missing-queues-fatal: false
      direct:
        missing-queues-fatal: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    mail:
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:false}

gym:
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173}
  notifications:
    fee-reminder-window-days: 5
    renewal-reminder-window-days: 7
    scheduler-cron: "0 0 9 * * *"
    exchange: gym.notifications.exchange
    routing-key: notifications.dispatch
    queue: gym.notifications.dispatch
    dead-letter-exchange: gym.notifications.dlx
    dead-letter-queue: gym.notifications.dispatch.dlq
    dead-letter-routing-key: notifications.dispatch.dlq
    brand-name: ${GYM_BRAND_NAME:Codex Gym}
    whatsapp:
      enabled: ${WHATSAPP_ENABLED:true}
      dry-run: ${WHATSAPP_DRY_RUN:true}
      webhook-url: ${WHATSAPP_WEBHOOK_URL:}
      bearer-token: ${WHATSAPP_BEARER_TOKEN:}
    email:
      enabled: ${EMAIL_NOTIFICATIONS_ENABLED:false}
      from: ${MAIL_FROM:no-reply@codexgym.local}
      admin-recipient: ${ADMIN_EMAIL_RECIPIENT:}
    telegram:
      enabled: ${TELEGRAM_ENABLED:false}
      dry-run: ${TELEGRAM_DRY_RUN:true}
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      bot-username: ${TELEGRAM_BOT_USERNAME:}
      chat-id: ${TELEGRAM_CHAT_ID:}
      api-base-url: ${TELEGRAM_API_BASE_URL:https://api.telegram.org}
      connect-token-ttl-minutes: ${TELEGRAM_CONNECT_TOKEN_TTL_MINUTES:30}
      deep-link-base-url: ${TELEGRAM_DEEP_LINK_BASE_URL:https://t.me}
