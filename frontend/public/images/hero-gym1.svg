<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="gymGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2838;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e2b3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#gymGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="#ff6b35" opacity="0.1"/>
  <circle cx="1050" cy="500" r="120" fill="#ff6b35" opacity="0.08"/>
  
  <!-- Dumbbells left -->
  <g>
    <rect x="80" y="200" width="20" height="200" fill="#ff6b35"/>
    <circle cx="90" cy="180" r="35" fill="#ff6b35"/>
    <circle cx="90" cy="420" r="35" fill="#ff6b35"/>
    <rect x="75" y="400" width="30" height="15" fill="#ff6b35"/>
    <rect x="75" y="185" width="30" height="15" fill="#ff6b35"/>
  </g>
  
  <!-- Barbell center -->
  <g>
    <rect x="450" y="250" width="300" height="18" fill="#1a1a1a"/>
    <rect x="420" y="220" width="60" height="80" fill="#ff6b35" opacity="0.9"/>
    <rect x="720" y="220" width="60" height="80" fill="#ff6b35" opacity="0.9"/>
    <rect x="410" y="210" width="80" height="100" fill="#ff6b35" opacity="0.6"/>
    <rect x="710" y="210" width="80" height="100" fill="#ff6b35" opacity="0.6"/>
  </g>
  
  <!-- Kettlebell right -->
  <g>
    <circle cx="1000" cy="300" r="45" fill="#ff6b35"/>
    <path d="M 955 255 Q 1000 200 1045 255" stroke="#ff6b35" stroke-width="12" fill="none"/>
    <rect x="985" y="200" width="30" height="55" fill="#ff6b35"/>
  </g>
  
  <!-- Text overlay -->
  <text x="600" y="100" font-family="Space Grotesk, sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">
    Premium Gym Management
  </text>
  <text x="600" y="150" font-family="Manrope, sans-serif" font-size="24" fill="#f7931e" text-anchor="middle">
    Elevate Your Fitness Empire
  </text>
  
  <!-- Decorative line -->
  <line x1="300" y1="180" x2="900" y2="180" stroke="#ff6b35" stroke-width="2" opacity="0.3"/>
</svg>