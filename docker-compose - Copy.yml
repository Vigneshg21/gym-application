services:
  postgres:
    image: postgres:15-alpine
    container_name: gym-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gym}
      POSTGRES_USER: ${POSTGRES_USER:-gymuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymuser} -d ${POSTGRES_DB:-gym}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: gym-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    image: codexgym/gym-platform:local
    container_name: gym-backend
    build:
      context: .
      dockerfile: Dockerfile.runtime
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-gym}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-gymuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-Asia/Kolkata}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      GYM_BRAND_NAME: ${GYM_BRAND_NAME:-Codex Gym}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@codexgym.local}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      EMAIL_NOTIFICATIONS_ENABLED: ${EMAIL_NOTIFICATIONS_ENABLED:-false}
      ADMIN_EMAIL_RECIPIENT: ${ADMIN_EMAIL_RECIPIENT:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-true}
      TELEGRAM_DRY_RUN: ${TELEGRAM_DRY_RUN:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      TELEGRAM_CONNECT_TOKEN_TTL_MINUTES: ${TELEGRAM_CONNECT_TOKEN_TTL_MINUTES:-30}
      TELEGRAM_DEEP_LINK_BASE_URL: ${TELEGRAM_DEEP_LINK_BASE_URL:-https://t.me}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-true}
      WHATSAPP_DRY_RUN: ${WHATSAPP_DRY_RUN:-true}
      WHATSAPP_WEBHOOK_URL: ${WHATSAPP_WEBHOOK_URL:-}
      WHATSAPP_BEARER_TOKEN: ${WHATSAPP_BEARER_TOKEN:-}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"

  frontend:
    image: codexgym/gym-frontend:local
    container_name: gym-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
